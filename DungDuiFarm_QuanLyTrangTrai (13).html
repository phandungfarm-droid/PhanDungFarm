<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dũng Dúi Farm — Quản lý trang trại</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
  :root{
    --bark:#241d16;
    --soil:#3d3223;
    --burrow:#5c4a34;
    --straw:#efe6cf;
    --straw-2:#e4d8ba;
    --paper:#faf6ea;
    --moss:#4a6b4d;
    --moss-dk:#33492f;
    --clay:#c07a2b;
    --clay-lt:#e8ac5c;
    --alert:#a83a2c;
    --alert-lt:#f4d9d2;
    --ok:#4a6b4d;
    --ink:#2a2418;
    --ink-soft:#6b6250;
    --line:#d8cba7;
    --radius:14px;
    --shadow: 0 2px 0 rgba(36,29,22,.06), 0 10px 24px -14px rgba(36,29,22,.35);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:transparent;color:var(--ink);font-family:'Work Sans',sans-serif;}
  #app{max-width:1180px;margin:0 auto;padding:18px 18px 60px;}
  h1,h2,h3,h4{font-family:'Fraunces',serif;font-weight:700;margin:0;color:var(--bark);}
  .mono{font-family:'JetBrains Mono',monospace;}
  a{color:inherit;}
  button{font-family:'Work Sans',sans-serif;cursor:pointer;border:none;}
  ::selection{background:var(--clay-lt);}

  /* topbar */
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;background:var(--bark);border-radius:var(--radius);color:var(--straw);margin-bottom:16px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:10px;}
  .brand-mark{width:34px;height:34px;border-radius:50%;background:radial-gradient(circle at 32% 30%,var(--clay-lt),var(--clay) 55%,var(--moss-dk) 100%);flex-shrink:0;position:relative;}
  .brand-mark::after{content:'';position:absolute;inset:9px;border-radius:50%;background:var(--bark);}
  .brand-text{display:flex;flex-direction:column;line-height:1.15;}
  .brand-text b{font-family:'Fraunces',serif;font-size:17px;color:var(--paper);}
  .brand-text span{font-size:11px;color:var(--straw-2);opacity:.8;letter-spacing:.04em;}
  .crumbs{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--straw-2);flex-wrap:wrap;}
  .crumbs button{background:none;color:var(--straw-2);padding:2px 4px;border-radius:6px;font-size:13px;}
  .crumbs button:hover{color:var(--paper);background:rgba(255,255,255,.08);}
  .crumbs .sep{opacity:.4;}
  .role-switch{display:flex;gap:4px;background:rgba(255,255,255,.08);padding:3px;border-radius:99px;}
  .role-switch button{padding:6px 12px;border-radius:99px;font-size:12.5px;color:var(--straw-2);background:none;font-weight:600;}
  .role-switch button.active{background:var(--clay);color:#2a1a06;}

  /* buttons */
  .btn{padding:9px 15px;border-radius:10px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;transition:transform .1s ease;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:var(--moss);color:#fff;}
  .btn-primary:hover{background:var(--moss-dk);}
  .btn-clay{background:var(--clay);color:#2a1a06;}
  .btn-clay:hover{background:#a86a24;}
  .btn-ghost{background:var(--straw-2);color:var(--ink);}
  .btn-ghost:hover{background:var(--line);}
  .btn-alert{background:var(--alert);color:#fff;}
  .btn-alert:hover{background:#8a2f23;}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-sm{padding:6px 10px;font-size:12.5px;border-radius:8px;}

  /* cards */
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);}
  .pad{padding:18px;}
  .grid{display:grid;gap:14px;}
  .g2{grid-template-columns:repeat(2,1fr);}
  .g3{grid-template-columns:repeat(3,1fr);}
  .g4{grid-template-columns:repeat(4,1fr);}
  @media(max-width:820px){.g3,.g4{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:560px){.g2,.g3,.g4{grid-template-columns:1fr;}}

  .stat{padding:16px;border-radius:12px;background:var(--straw);border:1px solid var(--line);}
  .stat .num{font-family:'Fraunces',serif;font-size:30px;font-weight:700;color:var(--bark);line-height:1;}
  .stat .lbl{font-size:12px;color:var(--ink-soft);margin-top:6px;font-weight:600;letter-spacing:.02em;}
  .stat.warn{background:var(--alert-lt);border-color:#e3b3a8;}
  .stat.warn .num{color:var(--alert);}
  .stat.clickable{cursor:pointer;transition:transform .1s;}
  .stat.clickable:hover{transform:translateY(-2px);}

  .section-title{display:flex;align-items:center;justify-content:space-between;margin:26px 0 12px;}
  .section-title h2{font-size:19px;}
  .badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:99px;background:var(--moss);color:#fff;}
  .badge.alert{background:var(--alert);}
  .badge.clay{background:var(--clay);color:#2a1a06;}
  .badge.ghost{background:var(--line);color:var(--ink-soft);}

  /* zone cards */
  .zone-card{padding:18px;cursor:pointer;transition:box-shadow .15s, transform .15s;position:relative;overflow:hidden;}
  .zone-card:hover{transform:translateY(-2px);box-shadow:0 4px 0 rgba(36,29,22,.08),0 16px 30px -16px rgba(36,29,22,.45);}
  .zone-card .zid{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);letter-spacing:.06em;}
  .zone-card h3{font-size:19px;margin:3px 0 10px;}
  .zone-fill{height:7px;border-radius:99px;background:var(--line);overflow:hidden;margin:10px 0 8px;}
  .zone-fill i{display:block;height:100%;background:var(--moss);}
  .zone-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);}

  /* burrow holes = cage grid */
  .cage-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:10px;}
  .hole{border:1px solid var(--line);background:var(--straw);border-radius:10px;padding:9px 7px;text-align:center;cursor:pointer;transition:transform .1s;position:relative;}
  .hole:hover{transform:translateY(-2px);border-color:var(--clay);}
  .hole .dot{width:15px;height:15px;border-radius:50%;margin:0 auto 6px;border:2px solid var(--ink-soft);}
  .hole.occupied .dot{background:var(--moss);border-color:var(--moss-dk);}
  .hole.empty .dot{background:transparent;}
  .hole.pairing .dot{background:var(--clay);border-color:#8a5a1c;}
  .hole.treat .dot{background:var(--alert);border-color:#7c281d;}
  .hole.moved .dot{background:transparent;border-color:var(--line);border-style:dashed;}
  .hole code{font-size:10.5px;color:var(--ink-soft);display:block;}
  .hole.due::before{content:'';position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--alert);}

  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft);margin-top:10px;}
  .legend span{display:inline-flex;align-items:center;gap:5px;}
  .legend i{width:10px;height:10px;border-radius:50%;display:inline-block;}

  /* task list */
  .task{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:11px;background:var(--straw);border:1px solid var(--line);margin-bottom:8px;}
  .task.overdue{background:var(--alert-lt);border-color:#e3b3a8;}
  .task .tico{width:9px;height:9px;border-radius:50%;background:var(--clay);flex-shrink:0;}
  .task.overdue .tico{background:var(--alert);}
  .task .ttxt{flex:1;font-size:13.5px;}
  .task .ttxt b{font-family:'JetBrains Mono',monospace;font-size:12.5px;background:var(--paper);padding:1px 6px;border-radius:5px;margin-right:6px;}
  .task .tdate{font-size:11.5px;color:var(--ink-soft);white-space:nowrap;}

  /* task table (Việc cần làm) */
  .task-table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--paper);margin-bottom:8px;}
  .task-table{width:100%;border-collapse:collapse;font-size:13px;min-width:520px;}
  .task-table thead th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:700;padding:10px 12px;border-bottom:1px solid var(--line);background:var(--straw);white-space:nowrap;}
  .task-table tbody td{padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .task-table tbody tr:last-child td{border-bottom:none;}
  .task-table tbody tr.overdue{background:var(--alert-lt);}
  .task-table td.mono{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--bark);white-space:nowrap;}
  .task-table td.actions{display:flex;gap:6px;white-space:nowrap;}
  .tag-overdue{background:var(--alert);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
  .loc-link{background:none;border:none;padding:0;font:inherit;color:var(--clay);font-weight:700;text-decoration:underline;text-underline-offset:2px;cursor:pointer;}
  .loc-link:hover{color:var(--moss-dk);}

  /* detail */
  .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 12px;font-size:13.5px;}
  .kv div:nth-child(odd){color:var(--ink-soft);font-weight:600;}
  .hist{border-left:2px solid var(--line);padding-left:14px;margin-left:5px;}
  .hist-item{position:relative;padding-bottom:16px;font-size:13px;}
  .hist-item::before{content:'';position:absolute;left:-19px;top:3px;width:9px;height:9px;border-radius:50%;background:var(--moss);border:2px solid var(--paper);}
  .hist-item .hd{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);}
  .hist-item .hb{margin-top:2px;}

  /* qr */
  .qrbox{background:#fff;padding:12px;border-radius:12px;display:inline-block;border:1px solid var(--line);}
  .qr-panel{display:flex;gap:16px;align-items:center;flex-wrap:wrap;}

  /* forms */
  .modal-bg{position:fixed;inset:0;background:rgba(36,29,22,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal{background:var(--paper);border-radius:16px;padding:22px;width:100%;max-width:460px;max-height:88vh;overflow:auto;box-shadow:0 20px 60px rgba(0,0,0,.4);}
  .modal h3{margin-bottom:14px;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin:12px 0 5px;}
  input,select,textarea{width:100%;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:#fff;font-family:'Work Sans',sans-serif;font-size:13.5px;color:var(--ink);}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--clay-lt);border-color:var(--clay);}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .radio-row{display:flex;gap:8px;margin-top:5px;}
  .radio-row label{flex:1;margin:0;border:1px solid var(--line);border-radius:9px;padding:9px;text-align:center;cursor:pointer;font-weight:600;color:var(--ink);background:#fff;}
  .radio-row input{width:auto;display:none;}
  .radio-row input:checked + span{color:var(--moss-dk);}
  .radio-row label:has(input:checked){border-color:var(--moss);background:#eef4ee;}

  .empty-state{text-align:center;padding:40px 20px;color:var(--ink-soft);}
  .empty-state h3{color:var(--ink-soft);margin-bottom:6px;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--bark);color:var(--paper);padding:11px 20px;border-radius:10px;font-size:13px;z-index:99;box-shadow:0 10px 30px rgba(0,0,0,.3);}
  .footer-note{margin-top:30px;font-size:11.5px;color:var(--ink-soft);text-align:center;line-height:1.6;}

  /* juvenile sub-panels */
  .subpanel{border:1px solid var(--line);border-radius:11px;padding:13px;margin-bottom:10px;background:var(--straw);}
  .subpanel h4{font-size:13.5px;margin-bottom:6px;}
  .subpanel .sp-status{font-size:12px;color:var(--ink-soft);margin-bottom:8px;}

  /* breeding zone: male/female split sections */
  .sex-section{margin-bottom:20px;}
  .sex-section:last-child{margin-bottom:0;}
  .sex-head{display:flex;align-items:center;gap:8px;font-family:'Fraunces',serif;font-weight:600;font-size:14.5px;color:var(--bark);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--line);}

  /* grouped task list (dashboard) */
  .task-summary{font-size:14px;margin-bottom:12px;}
  .task-summary b{font-family:'Fraunces',serif;color:var(--clay);}
  .task-group{margin-bottom:14px;}
  .task-group .gh{font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:flex;align-items:center;gap:8px;cursor:pointer;}
  .task-group .gh:hover{color:var(--bark);}

  /* QR print sheet */
  .qr-controls{display:flex;flex-direction:column;gap:12px;}
  .qr-zone-checks{display:flex;flex-wrap:wrap;gap:10px;}
  .qr-zone-checks label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;background:var(--straw);border:1px solid var(--line);border-radius:8px;padding:6px 12px;cursor:pointer;}
  .qr-zone-checks input{width:auto;}
  .qr-group-title{font-family:'Fraunces',serif;font-weight:700;font-size:16px;margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid var(--bark);}
  .qr-sheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
  .qr-tile{border:1px dashed #b8a97e;border-radius:8px;padding:8px;text-align:center;background:#fff;}
  .qr-tile .qbox{display:flex;justify-content:center;margin-bottom:4px;}
  .qr-tile .qcode{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--bark);}
  .qr-tile .qsub{font-size:9.5px;color:var(--ink-soft);}
  @media print{
    body{background:#fff;}
    .no-print{display:none !important;}
    .topbar{display:none !important;}
    #app{max-width:none;padding:0;}
    .qr-sheet{grid-template-columns:repeat(auto-fill,minmax(3.6cm,1fr));}
    .qr-tile{page-break-inside:avoid;border-color:#999;}
    .qr-group-title{page-break-before:always;}
    .qr-group-title:first-of-type{page-break-before:auto;}
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
(function(){
  const STORE_KEY = "farm-state-v2";
  let saveTimer = null;

  const TREAT_REASONS = ['Bệnh phổi','Tiêu chảy','Bị thương','Khác'];
  const WEIGHT_CLASSES = ['3-4 lạng','5-7 lạng','8 lạng-1kg'];
  const MALE_COMM_REASONS = ['Hết khả năng sinh sản','Bị thương','Khác'];
  const FEMALE_COMM_REASONS = ['Hết khả năng sinh sản','Bị thương','Không nuôi con','Khác'];
  const JUV_COMM_REASONS = ['Không có khả năng sinh sản','Bị thương','Khác'];
  const BABY_COMM_REASONS = ['Không đạt tiêu chuẩn / không khả năng sinh sản','Bị thương','Khác'];

  // ---------- default structure ----------
  function pad(n,len){ n=''+n; while(n.length<len) n='0'+n; return n; }

  function buildDefaultZones(){
    const zones = [];
    ['K1','K2'].forEach((zid,zi)=>{
      const cages = [];
      for(let i=1;i<=70;i++) cages.push({code:`${zid}-A-${pad(i,3)}`, sex:'male', status:'vacant', pairWith:null, pairDate:null, attempts:0, abandonCount:0, note:'', history:[], next:null});
      for(let i=1;i<=80;i++) cages.push({code:`${zid}-B-${pad(i,3)}`, sex:'female', status:'vacant', pairWith:null, pairDate:null, attempts:0, abandonCount:0, note:'', numBabies:0, history:[], next:null});
      zones.push({id:zid, name:`Khu ${zi+1} - Sinh sản`, type:'breeding', cages});
    });
    { const cages=[];
      for(let i=1;i<=50;i++) cages.push({code:`K3-HB${pad(i,3)}`, male:null, female:null, history:[]});
      zones.push({id:'K3', name:'Khu 3 - Hậu bị', type:'juvenile', cages});
    }
    { const classes=['3-4 lạng','3-4 lạng','5-7 lạng','5-7 lạng','8 lạng-1kg','8 lạng-1kg'];
      const cages=[];
      for(let i=1;i<=6;i++) cages.push({code:`K4-BB${pad(i,3)}`, weightClass:classes[i-1], count:0, history:[]});
      zones.push({id:'K4', name:'Khu 4 - Baby', type:'baby', cages});
    }
    { const cages=[];
      for(let i=1;i<=5;i++) cages.push({code:`K5-TP${pad(i,2)}`, count:0, history:[], sales:[]});
      zones.push({id:'K5', name:'Khu 5 - Thương phẩm', type:'commercial', cages});
    }
    { const cages=[];
      for(let i=1;i<=10;i++) cages.push({code:`K6-ĐT${pad(i,2)}`, status:'empty', patient:null, history:[]});
      zones.push({id:'K6', name:'Khu 6 - Điều trị', type:'treatment', cages});
    }
    return zones;
  }

  function defaultState(){
    return {
      farm:{name:'Dũng Dúi Farm', address:'KP 8, phường Lộc Ninh, thành phố Đồng Nai', phone:'0969310601', lastClean:null, lastDisinfect:null},
      zones: buildDefaultZones(),
      accounts: {
        admin: {username:'admin', password:'admin123', name:'Chủ trại'},
        staff: [
          {id:'nv1', username:'nv1', password:'12345', name:'Nhân viên 1'},
          {id:'nv2', username:'nv2', password:'12345', name:'Nhân viên 2'}
        ]
      },
      visits: [] // {date, role, name}
    };
  }

  let state = null;
  let ui = { view:'dashboard', zoneId:null, cageCode:null, role:null, currentUser:null, modal:null, toast:null, openGroups:{}, loginErr:null };
  const USING_CLAUDE_STORAGE = !!(typeof window!=='undefined' && window.storage && typeof window.storage.get==='function');
  const FB_CONFIG_KEY = 'dungduifarm-fb-config';
  let fbRef = null, fbReady = false, fbConfigExists = false, fbLastError = null;
  // Two concrete, checkable facts about the environment this file is running in —
  // these are the two most common reasons QR scanning / printing "don't work":
  const IN_IFRAME = (function(){ try{ return window.self !== window.top; }catch(e){ return true; } })();
  const HAS_REAL_URL = (function(){
    try{ return /^https?:\/\//i.test(location.href); }
    catch(e){ return false; }
  })();

  // ---------- persistence ----------
  // Three possible backends, in priority order:
  //  1. Firebase Realtime Database — a real shared backend, if the admin has set it up
  //     (see fbsetup). This is the only option that syncs live across different devices.
  //  2. window.storage — only exists inside Claude.ai's artifact viewer.
  //  3. localStorage — always available in any browser, but local to that one device only.
  function loadFirebaseConfig(){
    try{ const raw = window.localStorage.getItem(FB_CONFIG_KEY); return raw ? JSON.parse(raw) : null; }
    catch(e){ return null; }
  }
  function parseFirebaseConfigText(text){
    let t = (text||'').trim();
    t = t.replace(/^\s*(const|var|let)\s+\w+\s*=\s*/,'');
    t = t.replace(/;\s*$/,'');
    return new Function('return (' + t + ')')();
  }
  function initFirebase(config){
    try{
      if(typeof firebase==='undefined') return false;
      firebase.initializeApp(config);
      fbRef = firebase.database().ref('dungduifarm/state');
      return true;
    }catch(e){ return false; }
  }
  function attachFirebaseListener(){
    fbRef.on('value', (snap)=>{
      if(!snap.exists()) return;
      state = snap.val();
      backfillState();
      render();
    });
  }
  async function storageGet(key){
    if(USING_CLAUDE_STORAGE){
      const res = await window.storage.get(key, true);
      return res && res.value ? res.value : null;
    }
    try{ return window.localStorage.getItem(key); }catch(e){ return null; }
  }
  async function storageSet(key, value){
    if(USING_CLAUDE_STORAGE){
      await window.storage.set(key, value, true);
      return;
    }
    window.localStorage.setItem(key, value);
  }

  function backfillState(){
    const d = defaultState();
    if(!state.accounts) state.accounts = d.accounts;
    if(!state.accounts.staff) state.accounts.staff = d.accounts.staff;
    if(!state.visits) state.visits = [];
  }

  async function loadState(){
    const fbConfig = loadFirebaseConfig();
    fbConfigExists = !!fbConfig;
    if(fbConfig){
      if(initFirebase(fbConfig)){
        try{
          const snap = await fbRef.once('value');
          state = snap.exists() ? snap.val() : defaultState();
          backfillState();
          fbReady = true;
          fbLastError = null;
          attachFirebaseListener();
          applyHash();
          render();
          return;
        }catch(e){
          fbReady = false;
          fbLastError = (e && e.message) ? e.message : String(e);
          showToast('Không kết nối được tới cơ sở dữ liệu đám mây — tạm dùng dữ liệu cục bộ trên máy này.');
        }
      } else {
        fbReady = false;
        fbLastError = 'Không khởi tạo được Firebase (thiếu mạng, hoặc cấu hình sai định dạng).';
      }
    }
    try{
      const raw = await storageGet(STORE_KEY);
      state = raw ? JSON.parse(raw) : defaultState();
    }catch(e){
      state = defaultState();
    }
    backfillState();
    applyHash();
    render();
  }
  function scheduleSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{
      try{
        if(fbReady && fbRef){ await fbRef.set(state); }
        else{ await storageSet(STORE_KEY, JSON.stringify(state)); }
      }
      catch(e){ showToast('Không lưu được dữ liệu — thử lại sau'); }
    }, 250);
  }

  function applyHash(){
    const h = location.hash;
    let m;
    if(m = h.match(/^#\/zone\/([\w-]+)/)){ ui.view='zone'; ui.zoneId=m[1]; }
    else if(m = h.match(/^#\/cage\/([\w-]+)/)){
      const found = findCage(m[1]);
      if(found){ ui.view='cage'; ui.zoneId=found.zone.id; ui.cageCode=m[1]; }
    }
    else if(h==='#/qrsheet'){ ui.view='qrsheet'; }
  }

  // ---------- helpers ----------
  function getZone(id){ return state.zones.find(z=>z.id===id); }
  function findCage(code){
    for(const z of state.zones){
      const c = z.cages.find(c=>c.code===code);
      if(c) return {zone:z, cage:c};
    }
    return null;
  }
  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function nowLocalStr(){
    const d = new Date();
    const p = n=>String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  function addDays(dateStr, n){
    const d = new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+n);
    return d.toISOString().slice(0,10);
  }
  function fmtDate(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }
  function fmtDateTime(dt){
    if(!dt) return '—';
    const [datePart,timePart] = dt.split('T');
    return `${fmtDate(datePart)}${timePart? ' lúc '+timePart:''}`;
  }
  function pushHist(cage, text, date){
    cage.history = cage.history || [];
    cage.history.unshift({date: date||todayStr(), text});
  }

  // ---------- forecast / task engine ----------
  function collectTasks(){
    const tasks = [];
    state.zones.forEach(zone=>{
      zone.cages.forEach(cage=>{
        if(zone.type==='juvenile'){
          ['male','female'].forEach(sex=>{
            const slot = cage[sex];
            if(slot && slot.next){
              tasks.push(taskObj(zone, cage.code, `${slot.next.label} (${sex==='male'?'đực':'cái'})`, slot.next.date));
            }
          });
        } else if(cage.next){
          tasks.push(taskObj(zone, cage.code, cage.next.label, cage.next.date));
        }
      });
    });
    if(state.farm.lastClean){
      const next = addDays(state.farm.lastClean,7);
      if(next<=todayStr()) tasks.push(taskObj({id:'FARM',name:'Toàn trại'}, '—', 'Vệ sinh chuồng trại định kỳ (7 ngày/lần)', next));
    } else {
      tasks.push(taskObj({id:'FARM',name:'Toàn trại'}, '—', 'Chưa có dữ liệu vệ sinh chuồng trại — ghi nhận lần đầu để bắt đầu theo dõi định kỳ', todayStr()));
    }
    if(state.farm.lastDisinfect){
      const next = addDays(state.farm.lastDisinfect,30);
      if(next<=todayStr()) tasks.push(taskObj({id:'FARM',name:'Toàn trại'}, '—', 'Phun khử trùng định kỳ (30 ngày/lần)', next));
    }
    tasks.sort((a,b)=> (a.overdue===b.overdue? a.date.localeCompare(b.date) : (a.overdue? -1:1)));
    return tasks;
  }
  function taskObj(zone, code, label, date){
    return {zoneId:zone.id, zoneName:zone.name, code, label, date, overdue: date<todayStr(), dueToday: date===todayStr()};
  }
  function tasksForZone(zoneId){ return collectTasks().filter(t=>t.zoneId===zoneId); }
  function dueTasks(){ return collectTasks().filter(t=>t.overdue||t.dueToday); }

  // ---------- stats ----------
  function computeStats(){
    let totalCages=0, emptyCages=0, totalAnimals=0;
    let breedingMale=0, breedingFemale=0, nursingMothers=0, nursingBabies=0;
    let juvMale=0, juvFemale=0;
    let babyByClass={}, babyCount=0, commercialCount=0, treatingCount=0, treatingSick=0, treatingInjured=0;
    let pairAttemptsTotal=0, birthSuccessTotal=0;

    state.zones.forEach(zone=>{
      if(zone.type==='breeding'){
        zone.cages.forEach(c=>{
          totalCages++;
          if(c.status==='vacant') emptyCages++;
          if(c.status!=='vacant'){
            totalAnimals++;
            if(c.sex==='male') breedingMale++; else breedingFemale++;
            if(c.status==='nursing'){ nursingMothers++; nursingBabies += (c.numBabies||0); }
          }
          pairAttemptsTotal += (c.attempts||0);
          if((c.history||[]).some(h=>h.text.includes('nuôi'))) birthSuccessTotal += 0; // reserved
        });
      } else if(zone.type==='juvenile'){
        zone.cages.forEach(c=>{
          totalCages++;
          if(!c.male && !c.female) emptyCages++;
          if(c.male){ totalAnimals++; juvMale++; }
          if(c.female){ totalAnimals++; juvFemale++; }
        });
      } else if(zone.type==='baby'){
        zone.cages.forEach(c=>{
          totalCages++; if(!c.count) emptyCages++;
          babyCount += (c.count||0); totalAnimals += (c.count||0);
          babyByClass[c.weightClass] = (babyByClass[c.weightClass]||0) + (c.count||0);
        });
      } else if(zone.type==='commercial'){
        zone.cages.forEach(c=>{ totalCages++; if(!c.count) emptyCages++; commercialCount += (c.count||0); totalAnimals += (c.count||0); });
      } else if(zone.type==='treatment'){
        zone.cages.forEach(c=>{
          totalCages++;
          if(c.status==='empty') emptyCages++;
          else { totalAnimals++; treatingCount++; if(c.patient){ if(c.patient.kind==='Bệnh phổi'||c.patient.kind==='Tiêu chảy') treatingSick++; else treatingInjured++; } }
        });
      }
    });
    const totalMale = breedingMale + juvMale;
    const totalFemale = breedingFemale + juvFemale;
    const productivityRate = pairAttemptsTotal>0 ? Math.round((nursingMothers/(pairAttemptsTotal+nursingMothers))*100) : null;
    return {totalCages, emptyCages, totalAnimals, breedingMale, breedingFemale, nursingMothers, nursingBabies,
      juvMale, juvFemale, totalMale, totalFemale, babyByClass, babyCount, commercialCount, treatingCount, treatingSick, treatingInjured, productivityRate};
  }

  function actSeparate(femaleCode, date){

    f.status='just_separated_male'; f.pairWith=maleCode; f.pairDate=date; f.next=null;
    pushHist(f, `Tách ghép khỏi ${maleCode} — chờ theo dõi kết quả`, date);

    pushHist(f, `Không đậu thai (lần ghép thứ ${f.attempts})${note? ' — '+note:''} — dự kiến ghép lại ${fmtDate(nextDate)}`, date);
    if(f.attempts>=3) pushHist(f, `Đã ghép đủ 3 lần không đậu thai — cần đánh giá chuyển khu thương phẩm`, date);

    f.abandonCount = (f.abandonCount||0)+1;
    f.status='abandoned'; f.numBabies=0; f.pairWith=null;
    f.next={label:'Đến ngày dự kiến ghép lại (sau khi bỏ con)', date: nextDate};
    pushHist(f, `Bỏ con (lần thứ ${f.abandonCount})${note? ' — '+note:''} — dự kiến ghép lại ${fmtDate(nextDate)}`, date);

  function actWean(femaleCode, date, careGood, babyCageCode){
    const f = findCage(femaleCode).cage;
    const n = f.numBabies||0;
    if(babyCageCode && n>0){
      const bc = findCage(babyCageCode).cage;
      bc.count = (bc.count||0)+n;
      pushHist(bc, `Nhận ${n} baby từ ô mẹ ${femaleCode}`, date);
    }
    pushHist(f, `Tách mẹ, chuyển ${n} con sang khu Baby${babyCageCode? ' ('+babyCageCode+')':''} — chăm con: ${careGood?'tốt':'không tốt'}`, date);
    f.status='recovering'; f.numBabies=0; f.pairWith=null;
    f.next = {label:'Dự kiến hồi phục xong, quay lại ghép đôi', date: addDays(date,12)};
  }

    f.next = {label:'Dự kiến hồi phục xong, quay lại ghép đôi', date: addDays(date,12)};

  }

  // ======================================================================
  // ZONE / CAGE MANAGEMENT — add new zones, delete zones or individual cages
  // ======================================================================
  function actAddZone(id, name, type){
    state.zones.push({ id, name, type, cages: [] });
  }
  function actDeleteZone(zoneId){
    state.zones = state.zones.filter(z=>z.id!==zoneId);
  }

  // Splits a cage code into the non-numeric prefix and the trailing number,
  // e.g. "K1-A-007" -> {prefix:"K1-A-", num:"007", digits:3}. Cages that don't
  // end in digits (unusual custom codes) return null and are left untouched.
  function parseCodeParts(code){
    const m = code.match(/^(.*?)(\d+)$/);
    if(!m) return null;
    return { prefix: m[1], digits: m[2].length };
  }
  // Renumbers every cage in `zone` that shares the same prefix as the just-deleted
  // cage, in their current list order, so the sequence has no gap (001,002,003...
  // instead of 001,003,004 after 002 is removed). Returns a map of old code -> new
  // code for every cage whose code actually changed, so callers can fix up any
  // other cage that was referencing the old code (e.g. a pairing partner).
  function renumberZoneSeries(zone, prefix){
    const codeMap = {};
    const series = zone.cages
      .map(c=>({cage:c, parts:parseCodeParts(c.code)}))
      .filter(x=>x.parts && x.parts.prefix===prefix);
    series.forEach((x,i)=>{
      const newCode = x.parts.prefix + String(i+1).padStart(x.parts.digits,'0');
      if(newCode !== x.cage.code){
        codeMap[x.cage.code] = newCode;
        x.cage.code = newCode;
      }
    });
    return codeMap;
  }
  // Applies an old-code -> new-code map to every live cross-reference in the farm
  // (a female's "đang ghép với" male code, a treatment cage's source-cage code).
  // History log text is left as-is — it's a record of what was true at the time.
  function applyCodeRename(codeMap){
    if(!codeMap || Object.keys(codeMap).length===0) return;
    state.zones.forEach(z=>{
      z.cages.forEach(c=>{
        if(c.pairWith && codeMap[c.pairWith]) c.pairWith = codeMap[c.pairWith];
        if(c.patient && c.patient.sourceCode && codeMap[c.patient.sourceCode]) c.patient.sourceCode = codeMap[c.patient.sourceCode];
      });
    });
  }
  function actDeleteCage(code){
    const found = findCage(code);
    if(!found) return 0;
    const parts = parseCodeParts(code);
    found.zone.cages = found.zone.cages.filter(c=>c.code!==code);
    if(parts){
      const codeMap = renumberZoneSeries(found.zone, parts.prefix);
      applyCodeRename(codeMap);
      return Object.keys(codeMap).length;
    }
    return 0;
  }

  // ======================================================================
  // GENERIC: to treatment / to commercial (used by breeding, juvenile, baby)
  // ======================================================================
  function actToTreatment(date, treatCageCode, kind, note, expectedDays, source){
    // source = {type:'breeding'|'juvenile'|'baby', code, sex(for juvenile), qty(for baby)}
    const t = findCage(treatCageCode).cage;
    let originLabel = source.code;
    if(source.type==='breeding'){
      const src = findCage(source.code).cage;
      src.status='in_treatment'; src.next=null; src.pairWith=null;
      pushHist(src, `Chuyển sang khu điều trị (${treatCageCode}) — lý do: ${kind}${note? ' — '+note:''}`, date);
    } else if(source.type==='juvenile'){
      const src = findCage(source.code).cage;
      const slot = src[source.sex];
      if(slot){ slot.status='in_treatment'; slot.next=null; }
      pushHist(src, `${source.sex==='male'?'Con đực':'Con cái'} chuyển sang khu điều trị (${treatCageCode}) — lý do: ${kind}${note? ' — '+note:''}`, date);
      originLabel = `${source.code} (${source.sex==='male'?'đực':'cái'})`;
    } else if(source.type==='baby'){
      const src = findCage(source.code).cage;
      src.count = Math.max(0, (src.count||0) - source.qty);
      pushHist(src, `Chuyển ${source.qty} con sang khu điều trị (${treatCageCode}) — lý do: ${kind}${note? ' — '+note:''}`, date);
      originLabel = `${source.code} (${source.qty} con)`;
    } else {
      originLabel = source.code || '(không rõ ô gốc)';
    }
    t.status='occupied';
    t.patient={ sourceType: source.type, sourceCode: source.code||null, sourceSex: source.sex||null, qty: source.qty||1, kind, note, admitDate: date, expectedDays };
    t.next={label:'Đánh giá kết quả điều trị', date: addDays(date, expectedDays||10)};
    pushHist(t, `Tiếp nhận từ ${originLabel} — lý do: ${kind}${note? ' — '+note:''} — dự kiến ${expectedDays||10} ngày`, date);
  }

  function actToCommercial(date, commCageCode, reason, note, source){
    const k5 = findCage(commCageCode).cage;
    const qty = source.qty || 1;
    k5.count = (k5.count||0) + qty;
    pushHist(k5, `Nhận ${qty} con từ ${source.code}${source.sex? ' ('+(source.sex==='male'?'đực':'cái')+')':''} — lý do: ${reason}${note? ' — '+note:''}`, date);

    if(source.type==='breeding'){
      const src = findCage(source.code).cage;
      src.status='vacant'; src.next=null; src.pairWith=null;
      pushHist(src, `Chuyển khu 5 thương phẩm (${commCageCode}) — lý do: ${reason}${note? ' — '+note:''} — ô chuyển về trạng thái trống`, date);
    } else if(source.type==='juvenile'){
      const src = findCage(source.code).cage;
      src[source.sex] = null;
      pushHist(src, `${source.sex==='male'?'Con đực':'Con cái'} chuyển khu 5 thương phẩm (${commCageCode}) — lý do: ${reason}${note? ' — '+note:''}`, date);
    } else if(source.type==='baby'){
      const src = findCage(source.code).cage;
      // qty already subtracted by caller before invoking (see submitModal) — nothing else to do
      pushHist(src, `Chuyển ${qty} con sang khu 5 thương phẩm (${commCageCode}) — lý do: ${reason}${note? ' — '+note:''}`, date);
    }
  }

  // ======================================================================
  // ACTIONS — JUVENILE (K3)
  // ======================================================================
  function actJuvAssign(code, sex, date){
    const c = findCage(code).cage;
    c[sex] = {since:date, status:'growing', next:null};
    pushHist(c, `Nhập số liệu thực tế: có ${sex==='male'?'đực':'cái'} hậu bị`, date);
  }
  function actJuvReady(code, sex, date, targetDate){
    const c = findCage(code).cage;
    const slot = c[sex];
    slot.status='ready_move';
    slot.next = {label:'Dự kiến chuyển lên khu sinh sản', date: targetDate};

  }
  function actJuvPromote(code, sex, date, destCageCode){
    const c = findCage(code).cage;
    actBreedingReady(destCageCode, date, `Chuyển lên từ hậu bị ${code}`);

    c[sex] = null;
  }

  // ======================================================================
  // ACTIONS — BABY / COMMERCIAL
  // ======================================================================
  function actStockEntry(cageCode, date, count, note, weightClass){
    const c = findCage(cageCode).cage;
    c.count = (c.count||0) + count;
    if(weightClass && weightClass!==c.weightClass){
      pushHist(c, `Đổi phân loại cân nặng: ${c.weightClass||'—'} → ${weightClass}`, date);
      c.weightClass = weightClass;
    }
    pushHist(c, `Nhập số liệu thực tế: +${count} con${note? ' — '+note:''}`, date);
  }
  function actSale(cageCode, date, count, weight){
    const c = findCage(cageCode).cage;
    c.count = Math.max(0,(c.count||0)-count);
    c.sales = c.sales||[];
    c.sales.unshift({date, count, weight});
    pushHist(c, `Xuất bán ${count} con — cân nặng TB ${weight}kg`, date);
  }

  // ======================================================================
  // ACTIONS — TREATMENT (K6)
  // ======================================================================
  function actTreatmentConclude(cageCode, date, result, targetCommCage){
    const t = findCage(cageCode).cage;
    const p = t.patient;
    if(p){
      if(result==='return'){
        if(p.sourceType==='breeding' && p.sourceCode){
          const back = findCage(p.sourceCode).cage;
          back.status='ready'; back.next=null;
          pushHist(back, `Hồi phục tốt, quay lại ô ban đầu từ khu điều trị`, date);
        } else if(p.sourceType==='juvenile' && p.sourceCode){
          const back = findCage(p.sourceCode).cage;
          back[p.sourceSex] = {since: date, status:'growing', next:null};
          pushHist(back, `${p.sourceSex==='male'?'Đực':'Cái'} hồi phục tốt, quay lại ô hậu bị từ khu điều trị`, date);
        } else if(p.sourceType==='baby' && p.sourceCode){
          const back = findCage(p.sourceCode).cage;
          back.count = (back.count||0) + (p.qty||1);
          pushHist(back, `Nhận lại ${p.qty||1} con hồi phục tốt từ khu điều trị`, date);
        }
        pushHist(t, `Kết luận điều trị: hồi phục tốt, chuyển về khu/ô cũ`, date);
      } else {
        if(targetCommCage){
          const k5 = findCage(targetCommCage).cage;
          const qty = p.qty||1;
          k5.count = (k5.count||0)+qty;
          pushHist(k5, `Nhận ${qty} con từ khu điều trị (${cageCode}) — điều trị không thành công`, date);
        }
        if(p.sourceType==='breeding' && p.sourceCode){
          const back = findCage(p.sourceCode).cage;
          back.status='vacant'; back.next=null;
          pushHist(back, `Điều trị không thành công — chuyển khu thương phẩm, ô về trạng thái trống`, date);
        } else if(p.sourceType==='juvenile' && p.sourceCode){
          const back = findCage(p.sourceCode).cage;
          back[p.sourceSex] = null;
          pushHist(back, `${p.sourceSex==='male'?'Đực':'Cái'} điều trị không thành công — chuyển khu thương phẩm`, date);
        }
        pushHist(t, `Kết luận điều trị: không có khả năng phục hồi, chuyển khu thương phẩm${targetCommCage? ' ('+targetCommCage+')':''}`, date);
      }
    }
    t.status='empty'; t.patient=null; t.next=null;
  }

  // ---------- accounts / visits ----------
  function actLogVisit(role, name){
    state.visits = state.visits || [];
    state.visits.push({date: todayStr(), role, name: name||null});
    if(state.visits.length > 2000) state.visits = state.visits.slice(-2000); // keep bounded
  }
  function tryLogin(role, username, password){
    if(role==='admin'){
      const a = state.accounts.admin;
      if(a.username===username && a.password===password) return {ok:true, name:a.name};
      return {ok:false};
    }
    const staff = (state.accounts.staff||[]).find(s=>s.username===username && s.password===password);
    return staff ? {ok:true, name:staff.name} : {ok:false};
  }
  function visitSummary(){
    const byDate = {};
    (state.visits||[]).forEach(v=>{
      const d = byDate[v.date] = byDate[v.date] || {admin:0, staff:0, visitor:0};
      d[v.role] = (d[v.role]||0)+1;
    });
    return Object.keys(byDate).sort().reverse().slice(0,14).map(date=>({date, ...byDate[date]}));
  }
  function actAddStaff(username, password, name){
    state.accounts.staff = state.accounts.staff || [];
    state.accounts.staff.push({id:'s'+Date.now(), username, password, name});
  }
  function actUpdateStaff(id, username, password, name){
    const s = (state.accounts.staff||[]).find(s=>s.id===id);
    if(s){ s.username=username; s.password=password; s.name=name; }
  }
  function actRemoveStaff(id){
    state.accounts.staff = (state.accounts.staff||[]).filter(s=>s.id!==id);
  }
  function actUpdateAdmin(username, password, name){
    state.accounts.admin = {username, password, name};
  }

  // ---------- QR ----------
  function qrValueFor(kind, id, customBase){
    const base = customBase || location.href.split('#')[0];
    if(kind==='farm') return base;
    if(kind==='zone') return `${base}#/zone/${id}`;
    if(kind==='cage') return `${base}#/cage/${id}`;
  }
  function renderQRInto(elId, text){
    setTimeout(()=>{
      const el = document.getElementById(elId);
      if(!el || typeof QRCode==='undefined') return;
      el.innerHTML='';
      new QRCode(el, {text, width:132, height:132, colorDark:'#241d16', colorLight:'#ffffff'});
    },0);
  }

  function statusLabel(zone, cage){
    if(zone.type==='breeding'){
      const map = {vacant:'Trống (chưa có cá thể)', ready:'Sẵn sàng ghép', pairing:'Đang ghép',
        just_separated_male: 'Mới tách đực', nursing:'Đang nuôi con', recovering:'Hồi phục sau sinh',
        not_pregnant:'Không đậu thai', abandoned:'Bỏ con', in_treatment:'Đang điều trị (khu 6)'};
      return map[cage.status] || cage.status;
    }
    if(zone.type==='treatment') return cage.status==='empty' ? 'Trống' : 'Đang điều trị';
    return '';
  }
  function holeClass(zone, cage){
    if(zone.type==='breeding'){
      if(cage.status==='vacant') return 'empty';
      if(cage.status==='pairing') return 'pairing';
      if(cage.status==='in_treatment') return 'treat';
      return 'occupied';
    }
    if(zone.type==='juvenile') return (cage.male||cage.female) ? 'occupied' : 'empty';
    if(zone.type==='treatment') return cage.status==='empty' ? 'empty' : 'treat';
    return (cage.count>0) ? 'occupied':'empty';
  }

  function renderAllQrTiles(){
    setTimeout(()=>{
      if(typeof QRCode==='undefined') return;
      document.querySelectorAll('.qbox').forEach(el=>{
        const idKey = el.id.replace(/^qrt-/,'');
        let value;
        if(idKey==='farm') value = qrValueFor('farm', null, ui.qr.baseUrl);
        else if(idKey.startsWith('zone-')) value = qrValueFor('zone', idKey.slice(5), ui.qr.baseUrl);
        else if(idKey.startsWith('cage-')) value = qrValueFor('cage', idKey.slice(5), ui.qr.baseUrl);
        else return;
        el.innerHTML='';
        new QRCode(el, {text:value, width:90, height:90, colorDark:'#241d16', colorLight:'#ffffff'});
      });
    }, 0);
  }

  // Builds a fully standalone, self-contained HTML document (QR images inlined as
  // data URLs, no external scripts) for printing. This is downloaded as a real file
  // rather than printed in-place, because window.print()/window.open() are often
  // blocked when this app is viewed inside an embedding iframe (e.g. a chat preview
  // panel) — a plain file download is far more reliably allowed everywhere.
  function buildQrPrintDocument(){
    const container = document.getElementById('qr-print-area');
    if(!container) return null;
    const clone = container.cloneNode(true);
    const origCanvases = container.querySelectorAll('canvas');
    const cloneCanvases = clone.querySelectorAll('canvas');
    if(origCanvases.length===0) return null; // QR codes not rendered yet
    origCanvases.forEach((c,i)=>{
      let dataUrl = '';
      try{ dataUrl = c.toDataURL('image/png'); }catch(e){}
      const img = document.createElement('img');
      img.src = dataUrl; img.width = c.width; img.height = c.height;
      const target = cloneCanvases[i];
      if(target && target.parentNode) target.parentNode.replaceChild(img, target);
    });
    const bodyHtml = clone.innerHTML;
    return `<!DOCTYPE html><html><head><meta charset="utf-8"/><title>Mã QR — ${state.farm.name}</title>
<style>
  body{font-family:Arial,Helvetica,sans-serif;margin:18px;color:#241d16;}
  .hint{font-size:13px;color:#555;background:#f4efe0;border:1px solid #ddd;border-radius:8px;padding:10px 14px;margin-bottom:18px;}
  .qr-group-title{font-weight:700;font-size:16px;margin:22px 0 10px;padding-bottom:6px;border-bottom:2px solid #241d16;page-break-before:always;}
  .qr-group-title:first-of-type{page-break-before:auto;margin-top:0;}
  .qr-sheet{display:grid;grid-template-columns:repeat(auto-fill,minmax(3.4cm,1fr));gap:10px;}
  .qr-tile{border:1px dashed #999;border-radius:8px;padding:8px;text-align:center;page-break-inside:avoid;}
  .qr-tile img{display:block;margin:0 auto 4px;max-width:100%;height:auto;}
  .qcode{font-family:'Courier New',monospace;font-size:11px;font-weight:700;}
  .qsub{font-size:9.5px;color:#666;}
  @media print{ .hint{display:none;} }
</style>
</head><body>
  <p class="hint">Trang này đã sẵn sàng để in. Nhấn <b>Ctrl+P</b> (Windows) hoặc <b>Cmd+P</b> (Mac) để in hoặc lưu thành PDF.</p>
  ${bodyHtml}
</body></html>`;
  }
  function downloadQrPrintSheet(){
    const html = buildQrPrintDocument();
    if(!html){ showToast('Chưa có mã QR để tải — bấm "Áp dụng thay đổi" và đợi mã hiện ra rồi thử lại.'); return; }
    const blob = new Blob([html], {type:'text/html'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ma-qr-in-' + todayStr() + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
  }

          body += `<button class="btn btn-ghost btn-sm" data-open="juvtreat" data-sex="${sex}">Chuyển khu Điều trị</button>`;

        }
        body += `</div>`;
      }
    }
    return `<div class="subpanel"><h4>${label}</h4>${body}</div>`;
  }

  function cageInfoHTML(zone,cage){
    if(zone.type==='breeding'){
      const partnerLabel = cage.sex==='male' ? 'Đang ghép với ô cái' : 'Đang ghép với ô đực';
      const justSepLabel = cage.sex==='male' ? 'Mới tách khỏi ô cái' : 'Mới tách khỏi ô đực';
      return `<div class="kv">
        <div>Loại ô</div><div>${cage.sex==='male'?'Ô đực':'Ô cái'}</div>
        <div>Trạng thái</div><div>${statusLabel(zone,cage)}</div>
        ${cage.pairWith && cage.status==='pairing'? `<div>${partnerLabel}</div><div class="mono">${cage.pairWith}</div><div>Ngày bắt đầu ghép</div><div>${fmtDate(cage.pairDate)}</div>`:''}
        ${cage.pairWith && cage.status!=='pairing'? `<div>${justSepLabel}</div><div class="mono">${cage.pairWith}</div><div>Ngày tách</div><div>${fmtDate(cage.pairDate)}</div>`:''}
        ${cage.numBabies? `<div>Số con hiện tại</div><div>${cage.numBabies}</div>`:''}
        <div>Số lần không đậu thai</div><div>${cage.attempts||0}</div>
        ${cage.sex==='female'? `<div>Số lần bỏ con</div><div>${cage.abandonCount||0}</div>`:''}
      </div>`;
    }
    if(zone.type==='baby'){
      return `<div class="kv"><div>Loại cân nặng</div><div>${cage.weightClass}</div><div>Số lượng</div><div>${cage.count||0} con</div></div>`;
    }
    if(zone.type==='commercial'){
      return `<div class="kv"><div>Số lượng hiện có</div><div>${cage.count||0} con</div></div>
      ${cage.sales&&cage.sales.length? `<h3 style="font-size:13px;margin-top:14px;">Lịch sử xuất bán</h3><div class="hist">${cage.sales.map(s=>`<div class="hist-item"><div class="hd">${fmtDate(s.date)}</div><div class="hb">${s.count} con — TB ${s.weight}kg</div></div>`).join('')}</div>`:''}`;
    }
    if(zone.type==='treatment'){
      if(!cage.patient) return `<p style="color:var(--ink-soft);font-size:13px;">Ô trống, chưa tiếp nhận điều trị.</p>`;
      const p = cage.patient;
      const srcLabel = {breeding:'Ô sinh sản', juvenile:'Ô hậu bị', baby:'Chuồng baby', unknown:'Không rõ'}[p.sourceType]||'—';
      return `<div class="kv">
        <div>Nguồn</div><div>${srcLabel}${p.sourceCode? ' — '+p.sourceCode:''}${p.sourceSex? ' ('+(p.sourceSex==='male'?'đực':'cái')+')':''}${p.qty>1? ' — '+p.qty+' con':''}</div>
        <div>Lý do</div><div>${p.kind}</div>
        ${p.note? `<div>Ghi chú</div><div>${p.note}</div>`:''}
        <div>Ngày nhập</div><div>${fmtDate(p.admitDate)}</div>
        <div>Dự kiến điều trị</div><div>${p.expectedDays} ngày</div>
      </div>`;
    }
    return '';
  }

  function actionButtonsHTML(zone,cage){
    if(zone.type==='breeding'){
      let out = `<div style="display:flex;gap:8px;flex-wrap:wrap;">`;
      if(cage.status==='vacant'){
        out += btn('open','b_ready','+ Sẵn sàng ghép','btn-primary');
        if(cage.sex==='male'){
          out += btn('open','b_justsep','+ Mới tách cái','btn-ghost');
          out += btn('open','b_pairing','+ Đang ghép — chọn ô cái, ngày nào','btn-ghost');
        } else {
          out += btn('open','b_justsep','+ Mới tách đực','btn-ghost');
          out += btn('open','b_nursing','+ Đang nuôi con','btn-ghost');
          out += btn('open','b_justweaned','+ Mới tách con','btn-ghost');
          out += btn('open','b_pairing','+ Đang ghép — chọn ô đực, ngày nào','btn-ghost');
        }
      } else {
        if(cage.status==='ready'){
          if(cage.sex==='female') out += btn('open','pair','Đang ghép','btn-primary');
          else out += btn('open','pairm','Đang ghép','btn-primary');
          out += btn('open','clear','Đặt lại về trống','btn-ghost');
        }
        if(cage.status==='pairing' && cage.sex==='female') out += btn('open','separate','Tách ghép','btn-primary');
        if(cage.sex==='female' && cage.status==='just_separated_male'){
          out += btn('open','b_nursing','Đang nuôi con','btn-primary');
          out += btn('open','b_notpreg','Không đậu thai','btn-ghost');
          out += btn('open','b_abandon','Bỏ con','btn-ghost');
          out += btn('open','b_ready','Sẵn sàng ghép','btn-ghost');
        }
        if(cage.sex==='female' && (cage.status==='not_pregnant'||cage.status==='abandoned')){
          out += btn('open','b_ready','Sẵn sàng ghép','btn-primary');
        }
        if(cage.status==='nursing'){ out += btn('open','wean','Tách mẹ / chuyển baby','btn-primary'); out += btn('open','b_abandon','Bỏ con','btn-ghost'); }
        if(cage.status==='recovering') out += btn('open','recover','Xác nhận hồi phục xong','btn-primary');
        if(cage.status!=='vacant' && cage.status!=='in_treatment' && cage.status!=='pairing'){
          out += btn('open','b_treat','Chuyển khu Điều trị','btn-ghost');
          out += btn('open','b_comm','Chuyển khu thương phẩm','btn-ghost');
        }
      }
      out += `</div>`;
      return out;
    }
    if(zone.type==='baby'){
      return `<div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${btn('open','stock','+ Nhập số liệu hiện có','btn-primary')}
        ${cage.count>0? btn('open','b4treat','Chuyển khu Điều trị','btn-ghost'):''}
        ${cage.count>0? btn('open','b4comm','Chuyển khu thương phẩm','btn-ghost'):''}
      </div>`;
    }
    if(zone.type==='commercial'){
      return `<div style="display:flex;gap:8px;flex-wrap:wrap;">${btn('open','stock','+ Nhập số liệu hiện có','btn-primary')}${(cage.count>0)? btn('open','sale','Ghi nhận xuất bán','btn-ghost'):''}</div>`;
    }
    if(zone.type==='treatment'){
      let out = `<div style="display:flex;gap:8px;flex-wrap:wrap;">`;
      if(cage.status==='occupied' || cage.patient) out += btn('open','treatoutcome','Ghi kết luận điều trị','btn-primary');
      else out += btn('open','assign_treat','+ Nhập cá thể đang điều trị (số liệu thực tế)','btn-primary');
      out += `</div>`;
      return out;
    }
    return '';
  }
  function btn(kind,type,label,cls){
    return `<button class="btn ${cls}" data-${kind}="${type}">${label}</button>`;
  }

  // MODALS
  // ======================================================================
  function reasonOptions(list){ return list.map(r=>`<option value="${r}">${r}</option>`).join(''); }
  function sameZoneMalesReady(zone){
    return zone.cages.filter(c=>c.sex==='male' && c.status==='ready').map(c=>`<option value="${c.code}">${c.code}</option>`).join('') || '<option disabled>Không có ô đực sẵn sàng ghép</option>';
  }
  function sameZoneFemalesReady(zone){
    return zone.cages.filter(c=>c.sex==='female' && c.status==='ready').map(c=>`<option value="${c.code}">${c.code}</option>`).join('') || '<option disabled>Không có ô cái sẵn sàng ghép</option>';
  }
  function sameZoneAllOfSex(zone, sex){
    return zone.cages.filter(c=>c.sex===sex).map(c=>`<option value="${c.code}">${c.code}</option>`).join('');
  }
  function babyCageOptions(){
    const z = getZone('K4');
    return z.cages.map(c=>`<option value="${c.code}">${c.code} (${c.weightClass})</option>`).join('');
  }
  function treatmentVacantOptions(){
    const z = getZone('K6');
    return z.cages.filter(c=>c.status==='empty').map(c=>`<option value="${c.code}">${c.code}</option>`).join('') || '<option disabled>Không còn ô điều trị trống</option>';
  }
  function commercialCageOptions(){
    const z = getZone('K5');
    return z.cages.map(c=>`<option value="${c.code}">${c.code}</option>`).join('');
  }
  function breedingVacantOptions(sex){
    let out = [];
    let any = false;
    ['K1','K2'].forEach(zid=>{
      const z = getZone(zid);
      const opts = z.cages.filter(c=>c.sex===sex && c.status==='vacant').map(c=>`<option value="${c.code}">${c.code}</option>`).join('');
      if(opts){ any = true; out.push(`<optgroup label="${z.name}">${opts}</optgroup>`); }
    });
    return any ? out.join('') : '<option disabled>Không còn ô trống phù hợp</option>';
  }

        <select name="weightclass">${WEIGHT_CLASSES.map(w=>`<option value="${w}" ${cage.weightClass===w?'selected':''}>${w}</option>`).join('')}</select>`:''}

        <label>Ghi chú</label><input type="text" name="note"/>
        <label>Ngày nhập liệu</label><input type="date" name="date" value="${today}"/>`,
      b4treat: ()=>`<h3>Chuyển khu Điều trị — ${cage.code}</h3>

        ${treatFormBody(cage.code, true)}`,
      b4comm: ()=>`<h3>Chuyển khu thương phẩm — ${cage.code}</h3>
        <label>Số lượng chuyển</label><input type="number" name="qty" min="1" max="${cage.count||1}" value="1"/>
        ${commFormBody(BABY_COMM_REASONS, cage.code, true)}`,
      sale: ()=>`<h3>Xuất bán — ${cage.code}</h3>
        <label>Số lượng bán</label><input type="number" name="count" min="1" value="1" max="${cage.count||1}"/>
        <label>Cân nặng trung bình (kg)</label><input type="number" step="0.1" name="weight" value="1.0"/>
        <label>Ngày</label><input type="date" name="date" value="${today}"/>`,

      // ---- treatment ----
      assign_treat: ()=>`<h3>Nhập cá thể đang điều trị — ${cage.code}</h3>
        <label>Loại nguồn</label>
        <div class="radio-row">
          <label><input type="radio" name="srctype" value="breeding" checked/><span>Đực/Cái sinh sản</span></label>
          <label><input type="radio" name="srctype" value="juvenile"/><span>Hậu bị</span></label>
          <label><input type="radio" name="srctype" value="baby"/><span>Baby</span></label>
        </div>
        <label>Mã ô/chuồng nguồn (không bắt buộc)</label><input type="text" name="srccode" placeholder="vd: K1-A-012"/>
        <label>Số lượng (chỉ áp dụng cho baby)</label><input type="number" name="qty" min="1" value="1"/>
        <label>Lý do</label><select name="kind">${reasonOptions(TREAT_REASONS)}</select>
        <label>Ghi chú thêm</label><textarea name="note" rows="2"></textarea>
        <label>Dự kiến số ngày điều trị</label><input type="number" name="expdays" min="1" value="10"/>
        <label>Ngày chuyển vào khu</label><input type="date" name="date" value="${today}"/>`,
      treatoutcome: ()=>`<h3>Kết luận điều trị — ${cage.code}</h3>
        <label>Ngày đánh giá</label><input type="date" name="date" value="${today}"/>
        <label>Kết quả</label>
        <div class="radio-row">
          <label><input type="radio" name="result" value="return" checked/><span>Đã điều trị xong, về khu cũ</span></label>
          <label><input type="radio" name="result" value="commercial"/><span>Không phục hồi, chuyển thương phẩm</span></label>
        </div>
        <label>Ô thương phẩm nhận (nếu chuyển thương phẩm)</label><select name="destcage">${commercialCageOptions()}</select>`,

      addcage: ()=>`<h3>Thêm ô / chuồng mới — ${m.zoneId}</h3>
        <label>Mã ô mới</label><input type="text" name="code" placeholder="vd: ${m.zoneId}-EXT-001"/>
        ${m.zoneId==='K1'||m.zoneId==='K2'? `<label>Loại</label><div class="radio-row"><label><input type="radio" name="sex" value="male" checked/><span>Đực</span></label><label><input type="radio" name="sex" value="female"/><span>Cái</span></label></div>`:''}
      `,
      addzone: ()=>`<h3>Thêm khu mới</h3>
        <label>Mã khu (viết liền không dấu, không trùng mã đã có)</label><input type="text" name="zoneid" placeholder="vd: K7"/>
        <label>Tên khu hiển thị</label><input type="text" name="zonename" placeholder="vd: Khu 7 - Sinh sản mở rộng"/>
        <label>Loại khu (quyết định cách nhập liệu/trạng thái của khu này)</label>
        <select name="zonetype">
          <option value="breeding">Sinh sản (ô đực/cái riêng, ghép đôi)</option>
          <option value="juvenile">Hậu bị</option>
          <option value="baby">Baby (theo cân nặng)</option>
          <option value="commercial">Thương phẩm</option>
          <option value="treatment">Điều trị</option>
        </select>
        <p style="font-size:11.5px;color:var(--ink-soft);margin-top:8px;">
          Khu mới sẽ chưa có ô nào — sau khi tạo, vào khu đó và bấm "+ Thêm ô/chuồng" để thêm từng ô một, không giới hạn số lượng.
        </p>`,
      delzone: ()=>{
        const z = getZone(m.zoneId);
        const cageCount = z ? z.cages.length : 0;
        return `<h3>Xoá khu "${z? z.name : m.zoneId}"?</h3>
        <p style="font-size:13px;color:var(--ink-soft);line-height:1.6;">
          Thao tác này sẽ xoá vĩnh viễn <b>toàn bộ ${cageCount} ô/chuồng</b> và mọi lịch sử dữ liệu trong khu này.
          <b>Không thể hoàn tác.</b> Chỉ xoá nếu bạn chắc chắn không còn cần khu này nữa.
        </p>`;
      },
      delcage: ()=>`<h3>Xoá ô "${cage? cage.code : m.cage}"?</h3>
        <p style="font-size:13px;color:var(--ink-soft);line-height:1.6;">
          Thao tác này sẽ xoá vĩnh viễn ô này cùng toàn bộ lịch sử của nó. <b>Không thể hoàn tác.</b><br/><br/>
          Các ô cùng loại đứng sau ô này trong danh sách sẽ <b>tự động đánh số đôn lên</b> để không bị trống số
          (vd xoá ${cage?cage.code:'...'}, ô ngay sau sẽ đổi thành mã ${cage?cage.code:'...'}, các ô còn lại lần lượt đôn theo).
          Mọi liên kết ghép đôi / điều trị đang tham chiếu tới các ô đổi số này sẽ được cập nhật theo tự động.
        </p>`,
    };

    function treatFormBody(sourceLabel, withoutHeader){
      return `${withoutHeader?'':'<h3>Chuyển khu Điều trị — '+sourceLabel+'</h3>'}
        <label>Ô điều trị (còn trống)</label><select name="treatcage">${treatmentVacantOptions()}</select>
        <label>Lý do</label><select name="kind">${reasonOptions(TREAT_REASONS)}</select>
        <label>Ghi chú thêm</label><textarea name="note" rows="2"></textarea>
        <label>Dự kiến số ngày điều trị</label><input type="number" name="expdays" min="1" value="10"/>
        <label>Ngày chuyển</label><input type="date" name="date" value="${today}"/>`;
    }
    function commFormBody(reasons, sourceLabel, withoutHeader){
      return `${withoutHeader?'':'<h3>Chuyển khu thương phẩm — '+sourceLabel+'</h3>'}
        <label>Ô thương phẩm nhận</label><select name="commcage">${commercialCageOptions()}</select>
        <label>Lý do</label><select name="reason">${reasonOptions(reasons)}</select>
        <label>Ghi chú thêm</label><textarea name="note" rows="2"></textarea>
        <label>Ngày chuyển</label><input type="date" name="date" value="${today}"/>`;
    }

    const submitLabel = {login:'Đăng nhập', acct_admin:'Cập nhật', acct_staffadd:'Thêm tài khoản', acct_staffedit:'Lưu thay đổi', fbsetup:'Lưu & Kết nối', addzone:'Tạo khu', delzone:'Xoá vĩnh viễn khu này', delcage:'Xoá vĩnh viễn ô này'}[m.type] || 'Lưu';
    const isDangerous = (m.type==='delzone' || m.type==='delcage');
    return `<div class="modal-bg" data-close="1">
      <div class="modal" onclick="event.stopPropagation()">
        ${forms[m.type] ? forms[m.type]() : '<p>—</p>'}
        <div class="modal-actions">
          <button class="btn btn-ghost" data-close="1">Hủy</button>
          <button class="btn ${isDangerous?'btn-alert':'btn-primary'}" data-submit="${m.type}">${submitLabel}</button>
        </div>
      </div>
    </div>`;
  }

  // ======================================================================
  // EVENTS
  // ======================================================================
  function bindEvents(){
    document.querySelectorAll('[data-nav]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const nav = el.getAttribute('data-nav'), id = el.getAttribute('data-id');
        if(nav==='dashboard'){ ui.view='dashboard'; location.hash=''; }
        if(nav==='zone'){ ui.view='zone'; ui.zoneId=id; location.hash='#/zone/'+id; }
        if(nav==='cage'){ ui.view='cage'; ui.cageCode=id; ui.zoneId=findCage(id).zone.id; location.hash='#/cage/'+id; }
        if(nav==='qrsheet'){ ui.view='qrsheet'; location.hash='#/qrsheet'; }
        render();
      });
    });
    document.querySelectorAll('[data-togglegroup]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const key = el.getAttribute('data-togglegroup');
        ui.openGroups[key] = !(ui.openGroups[key] !== false);
        render();
      });
    });
    document.querySelectorAll('[data-scrollto]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const target = document.getElementById(el.getAttribute('data-scrollto'));
        if(target) target.scrollIntoView({behavior:'smooth', block:'start'});
      });
    });
    document.querySelectorAll('[data-gateopen]').forEach(el=>{
      el.addEventListener('click', ()=>{
        ui.loginErr=null;
        ui.modal = { type:'login', loginRole: el.getAttribute('data-gateopen') };
        render();
      });
    });
    document.querySelectorAll('[data-guest]').forEach(el=>{
      el.addEventListener('click', ()=>{
        ui.role='visitor'; ui.currentUser=null; ui.loginErr=null;
        actLogVisit('visitor', null);
        afterAction();
      });
    });
    document.querySelectorAll('[data-logout]').forEach(el=>{
      el.addEventListener('click', ()=>{ ui.role=null; ui.currentUser=null; ui.view='dashboard'; ui.modal=null; render(); });
    });
    document.querySelectorAll('[data-open]').forEach(el=>{
      el.addEventListener('click', ()=>{
        ui.modal = { type: el.getAttribute('data-open'), cage: ui.cageCode, zoneId: el.getAttribute('data-zone')||ui.zoneId, sex: el.getAttribute('data-sex')||null, refId: el.getAttribute('data-refid')||null };
        render();
      });
    });
    document.querySelectorAll('[data-removestaff]').forEach(el=>{
      el.addEventListener('click', ()=>{
        actRemoveStaff(el.getAttribute('data-removestaff'));
        showToast('Đã xoá tài khoản nhân viên.');
        afterAction();
      });
    });
    document.querySelectorAll('[data-fbdisable]').forEach(el=>{
      el.addEventListener('click', ()=>{
        try{ window.localStorage.removeItem(FB_CONFIG_KEY); }catch(e){}
        showToast('Đã ngừng đồng bộ — đang tải lại...');
        setTimeout(()=>location.reload(), 700);
      });
    });
    document.querySelectorAll('[data-fbtest]').forEach(el=>{
      el.addEventListener('click', async ()=>{
        const resultEl = document.getElementById('fbtest-result');
        const textarea = document.querySelector('textarea[name="fbconfig"]');
        const setResult = (html)=>{ if(resultEl) resultEl.innerHTML = html; };
        if(!textarea || !textarea.value.trim()){ setResult('<span style="color:var(--alert);">Vui lòng dán cấu hình vào ô bên trên trước.</span>'); return; }
        setResult('Đang kiểm tra...');
        let cfg;
        try{ cfg = parseFirebaseConfigText(textarea.value); }
        catch(e){ setResult('<span style="color:var(--alert);">❌ Không đọc được đoạn cấu hình — kiểm tra lại đã dán đúng, đủ dấu ngoặc chưa.</span>'); return; }
        if(!cfg || !cfg.databaseURL){ setResult('<span style="color:var(--alert);">❌ Thiếu "databaseURL" trong cấu hình — kiểm tra lại đã copy đủ đoạn từ Firebase chưa.</span>'); return; }
        if(typeof firebase==='undefined'){ setResult('<span style="color:var(--alert);">❌ Không tải được thư viện Firebase — kiểm tra kết nối mạng của thiết bị này rồi thử lại.</span>'); return; }
        try{
          const tempName = 'conntest-'+Date.now();
          const tempApp = firebase.initializeApp(cfg, tempName);
          const testRef = tempApp.database().ref('dungduifarm/_connectiontest');
          await testRef.set({ts: Date.now()});
          await testRef.once('value');
          await testRef.remove();
          await tempApp.delete();
          setResult('<span style="color:var(--moss-dk);">✅ Kết nối thành công! Bấm "Lưu &amp; Kết nối" bên dưới để dùng chính thức.</span>');
        }catch(e){
          const msg = (e && e.message) ? e.message : String(e);
          setResult('<span style="color:var(--alert);">❌ Lỗi: '+msg+'</span>');
        }
      });
    });
    const qrApplyBtn = document.querySelector('[data-qrapply]');
    if(qrApplyBtn){
      qrApplyBtn.addEventListener('click', ()=>{
        ensureQrUi();
        const urlEl = document.getElementById('qr-baseurl');
        if(urlEl && urlEl.value.trim()){
          ui.qr.baseUrl = urlEl.value.trim();
          state.farm.publishedUrl = ui.qr.baseUrl;
        }
        document.querySelectorAll('[data-qrzone]').forEach(cb=>{ ui.qr.zones[cb.getAttribute('data-qrzone')] = cb.checked; });
        const incEl = document.getElementById('qr-includecages');
        if(incEl) ui.qr.includeCages = incEl.checked;
        afterAction();
      });
    }
    const qrPrintBtn = document.querySelector('[data-qrprint]');
    if(qrPrintBtn){
      qrPrintBtn.addEventListener('click', ()=>{
        try{
          downloadQrPrintSheet();
        }catch(e){
          console.error(e);
          showToast('Không tải được file — thử nút "Thử in ngay tại đây" hoặc dùng Ctrl+P.');
        }
      });
    }
    const qrPrintNowBtn = document.querySelector('[data-qrprintnow]');
    if(qrPrintNowBtn){
      qrPrintNowBtn.addEventListener('click', ()=>{
        // Must call print() synchronously inside the click handler — any delay
        // (setTimeout, awaiting a re-render) makes some browsers silently block it
        // because it's no longer tied to the user's click gesture. This can still
        // fail silently if the page is embedded in a sandboxed iframe with printing
        // disabled — that's exactly why the download button above is the primary path.
        try{
          window.print();
        }catch(e){
          showToast('Trình duyệt chặn in tự động — dùng nút "Tải trang in mã QR" ở trên thay thế.');
        }
      });
    }
    document.querySelectorAll('[data-complete]').forEach(el=>{
      el.addEventListener('click', ()=>{
        const code = el.getAttribute('data-complete');
        const found = findCage(code);
        if(!found){ showToast('Không tìm thấy ô.'); return; }
        const {zone, cage} = found;
        let t = null;
        if(zone.type==='breeding'){
          const map = {pairing:'separate', just_separated_male:'b_nursing', nursing:'wean', recovering:'recover', not_pregnant:'b_ready', abandoned:'b_ready'};
          t = map[cage.status];
        } else if(zone.type==='treatment'){
          t = 'treatoutcome';
        } else if(zone.type==='commercial'){
          t = 'sale';
        }
        if(!t){ showToast('Không có thao tác phù hợp cho ô này.'); return; }
        ui.modal = { type: t, cage: code, zoneId: zone.id };
        render();
      });
    });
    const bg = document.querySelector('[data-close]');
    if(bg) bg.addEventListener('click', ()=>{ ui.modal=null; render(); });
    document.querySelectorAll('[data-submit]').forEach(el=>{
      el.addEventListener('click', ()=>submitModal(el.getAttribute('data-submit')));
    });
  }

  function readForm(){
    const modal = document.querySelector('.modal');
    const data = {};
    modal.querySelectorAll('input,select,textarea').forEach(inp=>{
      if(inp.type==='radio'){ if(inp.checked) data[inp.name]=inp.value; }
      else data[inp.name]=inp.value;
    });
    return data;
  }

  function submitModal(type){
    const m = ui.modal;
    const d = readForm();
    const date = d.date || todayStr();
    const sex = m.sex;
    try{
      if(type==='login'){
        const res = tryLogin(m.loginRole, d.username||'', d.password||'');
        if(!res.ok){ ui.loginErr='Sai tên đăng nhập hoặc mật khẩu.'; render(); return; }
        ui.role = m.loginRole; ui.currentUser = res.name; ui.loginErr=null;
        actLogVisit(m.loginRole, res.name);
      }
      else if(type==='fbsetup'){
        if(!d.fbconfig || !d.fbconfig.trim()){ showToast('Vui lòng dán đoạn cấu hình Firebase.'); return; }
        let cfg;
        try{ cfg = parseFirebaseConfigText(d.fbconfig); }
        catch(e){ showToast('Không đọc được đoạn cấu hình — kiểm tra lại định dạng đã dán đúng chưa.'); return; }
        if(!cfg || !cfg.databaseURL){ showToast('Thiếu databaseURL trong cấu hình — kiểm tra lại đã copy đủ đoạn chưa.'); return; }
        try{ window.localStorage.setItem(FB_CONFIG_KEY, JSON.stringify(cfg)); }
        catch(e){ showToast('Không lưu được cấu hình vào trình duyệt này.'); return; }
        showToast('Đã lưu cấu hình — đang tải lại để kết nối...');
        setTimeout(()=>location.reload(), 900);
        return;
      }
      else if(type==='acct_admin'){
        if(!d.username||!d.password){ showToast('Vui lòng nhập đủ thông tin.'); return; }
        actUpdateAdmin(d.username, d.password, d.name||'Chủ trại');
        showToast('Đã cập nhật tài khoản chủ trại.');
      }
      else if(type==='acct_staffadd'){
        if(!d.username||!d.password||!d.name){ showToast('Vui lòng nhập đủ thông tin.'); return; }
        if((state.accounts.staff||[]).some(s=>s.username===d.username)){ showToast('Tên đăng nhập đã tồn tại.'); return; }
        actAddStaff(d.username, d.password, d.name);
        showToast('Đã thêm tài khoản nhân viên.');
      }
      else if(type==='acct_staffedit'){
        if(!d.username||!d.password||!d.name){ showToast('Vui lòng nhập đủ thông tin.'); return; }
        actUpdateStaff(m.refId, d.username, d.password, d.name);
        showToast('Đã cập nhật tài khoản.');
      }

      else if(type==='clean'){ if(d.kind==='clean') state.farm.lastClean=date; else state.farm.lastDisinfect=date; showToast('Đã ghi nhận.'); }

      else if(type==='b_ready'){ actBreedingReady(m.cage, date, d.note); showToast('Đã cập nhật.'); }
      else if(type==='b_justsep'){
        const c = findCage(m.cage).cage;
        if(c.sex==='male') actMaleJustSeparated(m.cage, date, d.ref, d.note);
        else actFemaleJustSeparated(m.cage, date, d.ref, d.note);
        showToast('Đã cập nhật.');
      }
      else if(type==='pair'){ if(!d.male){ showToast('Vui lòng chọn ô đực.'); return;} actPair(m.cage, d.male, date); showToast('Đã ghi nhận ghép đôi.'); }
      else if(type==='pairm'){ if(!d.female){ showToast('Vui lòng chọn ô cái.'); return;} actPair(d.female, m.cage, date); showToast('Đã ghi nhận ghép đôi.'); }
      else if(type==='b_pairing'){
        const c = findCage(m.cage).cage;
        if(c.sex==='male'){
          if(!d.female){ showToast('Vui lòng chọn ô cái.'); return;}
          actPair(d.female, m.cage, date);
        } else {
          if(!d.male){ showToast('Vui lòng chọn ô đực.'); return;}
          actPair(m.cage, d.male, date);
        }
        showToast('Đã nhập số liệu thực tế: đang ghép.');
      }
      else if(type==='separate'){ actSeparate(m.cage, date); showToast('Đã tách ghép.'); }
      else if(type==='b_nursing'){ if(!d.num||!d.birthdate){ showToast('Vui lòng nhập đủ thông tin.'); return;} actNursing(m.cage, date, d.birthdate, parseInt(d.num,10)); showToast('Đã cập nhật.'); }
      else if(type==='b_justweaned'){ actJustWeaned(m.cage, date); showToast('Đã cập nhật.'); }
      else if(type==='b_notpreg'){ if(!d.nextdate){ showToast('Vui lòng chọn ngày dự kiến ghép lại.'); return;} actNotPregnant(m.cage, date, d.nextdate, d.note); showToast('Đã cập nhật.'); }
      else if(type==='b_abandon'){ if(!d.nextdate){ showToast('Vui lòng chọn ngày dự kiến ghép lại.'); return;} actAbandoned(m.cage, date, d.nextdate, d.note); showToast('Đã cập nhật.'); }
      else if(type==='wean'){ actWean(m.cage, date, d.care==='1', d.babycage); showToast('Đã tách mẹ.'); }
      else if(type==='recover'){ actRecoverDone(m.cage, date); showToast('Đã xác nhận hồi phục.'); }
      else if(type==='clear'){ actClearCage(m.cage, date); showToast('Đã đặt lại ô về trống.'); }

      else if(type==='b_treat' || type==='juvtreat'){
        if(!d.treatcage){ showToast('Không còn ô điều trị trống.'); return; }
        const source = type==='juvtreat' ? {type:'juvenile', code:m.cage, sex} : {type:'breeding', code:m.cage};
        actToTreatment(date, d.treatcage, d.kind, d.note, parseInt(d.expdays||'10',10), source);
        showToast('Đã chuyển khu điều trị.');
      }
      else if(type==='b_comm' || type==='juvcomm'){
        if(!d.commcage){ showToast('Vui lòng chọn ô thương phẩm.'); return; }
        const source = type==='juvcomm' ? {type:'juvenile', code:m.cage, sex} : {type:'breeding', code:m.cage};
        actToCommercial(date, d.commcage, d.reason, d.note, source);
        showToast('Đã chuyển khu thương phẩm.');
      }
      else if(type==='b4treat'){
        if(!d.treatcage){ showToast('Không còn ô điều trị trống.'); return; }
        const qty = Math.max(1, parseInt(d.qty||'1',10));
        actToTreatment(date, d.treatcage, d.kind, d.note, parseInt(d.expdays||'10',10), {type:'baby', code:m.cage, qty});
        showToast('Đã chuyển khu điều trị.');
      }
      else if(type==='b4comm'){
        if(!d.commcage){ showToast('Vui lòng chọn ô thương phẩm.'); return; }
        const qty = Math.max(1, parseInt(d.qty||'1',10));
        const src = findCage(m.cage).cage;
        src.count = Math.max(0, (src.count||0) - qty);
        actToCommercial(date, d.commcage, d.reason, d.note, {type:'baby', code:m.cage, qty});
        showToast('Đã chuyển khu thương phẩm.');
      }

      else if(type==='juvassign'){ actJuvAssign(m.cage, sex, date); showToast('Đã nhập số liệu.'); }
      else if(type==='juvready'){ if(!d.targetdate){ showToast('Vui lòng chọn ngày dự kiến.'); return;} actJuvReady(m.cage, sex, date, d.targetdate); showToast('Đã cập nhật.'); }
      else if(type==='juvpromote'){ if(!d.destcage){ showToast('Không còn ô sinh sản trống phù hợp.'); return;} actJuvPromote(m.cage, sex, date, d.destcage); showToast('Đã chuyển khu sinh sản.'); }

      else if(type==='stock'){ if(!d.count || parseInt(d.count,10)<1){ showToast('Vui lòng nhập số lượng hợp lệ.'); return;} actStockEntry(m.cage, date, parseInt(d.count,10), d.note, d.weightclass); showToast('Đã nhập số liệu.'); }
      else if(type==='sale'){ actSale(m.cage, date, parseInt(d.count||'1',10), parseFloat(d.weight||'1')); showToast('Đã ghi nhận xuất bán.'); }

      else if(type==='assign_treat'){
        if(!d.kind){ showToast('Vui lòng chọn lý do.'); return; }
        const qty = d.srctype==='baby' ? Math.max(1, parseInt(d.qty||'1',10)) : 1;
        actToTreatment(date, m.cage, d.kind, d.note, parseInt(d.expdays||'10',10), {type: d.srccode? d.srctype : 'unknown', code: d.srccode||null, qty});
        showToast('Đã nhập số liệu thực tế.');
      }
      else if(type==='treatoutcome'){
        if(d.result==='commercial' && !d.destcage){ showToast('Vui lòng chọn ô thương phẩm nhận.'); return; }
        actTreatmentConclude(m.cage, date, d.result, d.destcage);
        showToast('Đã ghi kết luận điều trị.');
      }

      else if(type==='addcage'){
        const z = getZone(m.zoneId);
        if(!d.code){ showToast('Vui lòng nhập mã ô.'); return; }
        if(z.cages.some(c=>c.code===d.code)){ showToast('Mã ô đã tồn tại.'); return; }
        if(z.type==='breeding') z.cages.push({code:d.code, sex:d.sex||'male', status:'vacant', pairWith:null, pairDate:null, attempts:0, abandonCount:0, history:[], next:null});
        else if(z.type==='juvenile') z.cages.push({code:d.code, male:null, female:null, history:[]});
        else if(z.type==='baby') z.cages.push({code:d.code, weightClass:'chưa phân loại', count:0, history:[]});
        else if(z.type==='commercial') z.cages.push({code:d.code, count:0, history:[], sales:[]});
        else if(z.type==='treatment') z.cages.push({code:d.code, status:'empty', patient:null, history:[]});
        showToast('Đã thêm ô mới.');
      }
      else if(type==='addzone'){
        const zid = (d.zoneid||'').trim();
        const zname = (d.zonename||'').trim();
        if(!zid || !zname){ showToast('Vui lòng nhập đủ mã khu và tên khu.'); return; }
        if(state.zones.some(z=>z.id===zid)){ showToast('Mã khu đã tồn tại — chọn mã khác.'); return; }
        actAddZone(zid, zname, d.zonetype||'breeding');
        showToast('Đã tạo khu mới.');
        ui.view='zone'; ui.zoneId=zid; location.hash='#/zone/'+zid;
      }
      else if(type==='delzone'){
        actDeleteZone(m.zoneId);
        showToast('Đã xoá khu.');
        ui.view='dashboard'; ui.zoneId=null; location.hash='';
      }
      else if(type==='delcage'){
        const found = findCage(m.cage);
        const zid = found ? found.zone.id : m.zoneId;
        const renumbered = actDeleteCage(m.cage);
        showToast(renumbered>0 ? `Đã xoá ô — đã đánh số lại ${renumbered} ô còn lại để không bị trống số.` : 'Đã xoá ô.');
        ui.view='zone'; ui.zoneId=zid; ui.cageCode=null; location.hash='#/zone/'+zid;
      }
    }catch(e){ showToast('Có lỗi khi lưu — kiểm tra lại dữ liệu.'); console.error(e); return; }
    ui.modal = null;
    afterAction();
  }

  window.addEventListener('hashchange', ()=>{ applyHash(); render(); });
  loadState();
})();

</script>
</body>
</html>
